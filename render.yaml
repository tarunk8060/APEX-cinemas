services:
  - type: web
    name: apex-cinemas-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: apex-cinemas-db
          property: connectionString

databases:
  - name: apex-cinemas-db
    databaseName: apexcinemas
    user: apexuser
    plan: free
